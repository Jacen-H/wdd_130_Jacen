<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Custom Die Builder</title>
    <link rel="stylesheet" href="styles/builder_styles.css">
</head>



<body id="content">
    <header>
        <nav class="nav-bar">
            <a class="home-link" href="homepage_index.html">Home</a>
            <a class="builder-link" href="builder.html">Custom Builder</a>
            <a class="gallery-link" href="#">Gallery</a>
        </nav>
        <h1>Welcome to the Forge! In here, you are the Forgemaster! Build whatever die your campaign is in need of.</h1>
    </header>

    <main id="die-box">
        <h2>Die Preview Area</h2>
        <img id="die-preview" src="images/Die-Preview.png" alt="Die ready to be forged">
        <div class="button-box">
            <a class="save" href="#">Save Die</a>
        </div>
    </main>

    <section id="side-inputs">
        <label for="die-name">Die Name</label>
        <input type="die-name" id="die-name" name="die-name" required>
        
        <label for="num-sides">Number of Sides</label>
        <input type="num-sides" id="num-sides" name="num-sides" required>
        
        <p>SIDE INPUTS</p>

        <label for="side1">Side 1</label>
        <input type="side1" id="side1" name="side1" required>
        <div class="upload-btn-box">
            <a class="upload" href="#">UPLOAD IMAGE</a>
        </div>

        <label for="side2">Side 2</label>
        <input type="side2" id="side2" name="side2" required>
        <div class="upload-btn-box">
            <a class="upload" href="#">UPLOAD IMAGE</a>
        </div>

        <label for="side3">Side 3</label>
        <input type="side3" id="side3" name="side3" required>
        <div class="upload-btn-box">
            <a class="upload" href="#">UPLOAD IMAGE</a>
        </div>
    </section>
    
    <footer>

    </footer>
</body>
</html>
